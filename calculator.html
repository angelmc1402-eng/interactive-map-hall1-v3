        // --- 2. REGLAS: QUÉ ANCLA USA QUÉ BLOQUE MAESTRO ---
        const reglas = {
            "TCG-B": "20", "SPORT CARDS-A": "20", "SPORT CARDS-C": "20",
            "TCG-D": "28", "SPORT CARDS-B": "28", "SPORT CARDS-D": "28",
            "TCG-F": "24", "SPORT CARDS-E": "24", "SPORT CARDS-F": "24",
            "TCG-G": "24", "TCG-H": "24", "TCG-I": "24", "TCG-J": "24", "TCG-K": "24"
        };

        function generarTodo() {
            // Analizar el HTML en crudo
            const parser = new DOMParser();
            const doc = parser.parseFromString(rawHTML, 'text/html');
            const divs = Array.from(doc.querySelectorAll('.mesa'));

            const ref20 = []; const ref24 = []; const ref28 = [];
            const anclas = [];
            let htmlFinal = "\n";

            // Clasificar la información que nos has pasado
            divs.forEach(div => {
                const id = div.getAttribute('data-info');
                const t = parseFloat(div.style.top);
                const l = parseFloat(div.style.left);
                const w = parseFloat(div.style.width);
                const h = parseFloat(div.style.height);
                const mesaData = { id, t, l, w, h };

                // Guardar los bloques maestros
                if (id.startsWith('TCG-A-')) ref20.push(mesaData);
                else if (id.startsWith('TCG-E-')) ref24.push(mesaData);
                else if (id.startsWith('TCG-C-')) ref28.push(mesaData);
                // Guardar las anclas (acaban en -1 pero no son los maestros)
                else if (id.endsWith('-1')) anclas.push(mesaData);
            });

            // Buscar la base (el ancla) de cada bloque maestro
            const base20 = ref20.find(m => m.id === 'TCG-A-1');
            const base24 = ref24.find(m => m.id === 'TCG-E-1');
            const base28 = ref28.find(m => m.id === 'TCG-C-1');

            // 1. Primero, inyectamos en el código final los tres bloques maestros que mapeaste a mano
            [...ref20, ...ref24, ...ref28].forEach(m => {
                htmlFinal += `<div class="mesa" data-info="${m.id}" style="left: ${m.l.toFixed(4)}%; top: ${m.t.toFixed(4)}%; width: ${m.w.toFixed(4)}%; height: ${m.h.toFixed(4)}%;"></div>\n`;
            });

            // 2. Ahora viene la magia: Clonar a partir de las anclas
            anclas.forEach(ancla => {
                // Extraer el prefijo (ej: "TCG-B" de "TCG-B-1")
                const prefijo = ancla.id.substring(0, ancla.id.lastIndexOf('-'));
                const tamano = reglas[prefijo];

                let bloqueReferencia = [];
                let baseReferencia = null;

                if (tamano === "20") { bloqueReferencia = ref20; baseReferencia = base20; }
                else if (tamano === "24") { bloqueReferencia = ref24; baseReferencia = base24; }
                else if (tamano === "28") { bloqueReferencia = ref28; baseReferencia = base28; }

                if (bloqueReferencia.length > 0 && baseReferencia) {
                    // Calculamos la distancia exacta entre el maestro y la nueva ancla
                    const deltaX = ancla.l - baseReferencia.l;
                    const deltaY = ancla.t - baseReferencia.t;

                    bloqueReferencia.forEach(mesaMaestra => {
                        // Calcular el ID nuevo (ej: TCG-A-5 -> SPORT CARDS-A-5)
                        const sufijoNum = mesaMaestra.id.split('-').pop();
                        const nuevoId = `${prefijo}-${sufijoNum}`;

                        // Calcular la nueva posición sumando el Delta
                        const finalL = mesaMaestra.l + deltaX;
                        const finalT = mesaMaestra.t + deltaY;

                        htmlFinal += `<div class="mesa" data-info="${nuevoId}" style="left: ${finalL.toFixed(4)}%; top: ${finalT.toFixed(4)}%; width: ${mesaMaestra.w.toFixed(4)}%; height: ${mesaMaestra.h.toFixed(4)}%;"></div>\n`;
                    });
                }
            });

            htmlFinal += "";

            // Mostrar el resultado y copiar
            const txt = document.getElementById('resultado');
            txt.value = htmlFinal;
            txt.select();
            document.execCommand('copy');
            
            document.getElementById('stats').innerText = `¡Magia pura! Se han clonado ${htmlFinal.split('class="mesa"').length - 1} mesas. Código copiado.`;
        }
